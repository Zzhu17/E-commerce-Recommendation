name: Release Production

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2026.04.20)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_MODEL_API: ${{ github.repository }}/model-api

jobs:
  pre-release-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install pip-audit checkov
      - run: pytest -q tests/test_split.py tests/test_metrics.py
      - run: pytest -q tests/integration
      - run: pip-audit --strict -r requirements.lock
      - run: checkov -d . --framework dockerfile,docker_compose,secrets --quiet

  build-and-sign:
    runs-on: ubuntu-latest
    needs: pre-release-gates
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      backend_digest: ${{ steps.push_backend.outputs.digest }}
      model_digest: ${{ steps.push_model.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push_backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.event.inputs.release_tag }}
      - id: push_model
        uses: docker/build-push-action@v6
        with:
          context: ./model-api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_MODEL_API }}:${{ github.event.inputs.release_tag }}
      - uses: sigstore/cosign-installer@v3.6.0
      - run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}@${{ steps.push_backend.outputs.digest }}
      - run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_MODEL_API }}@${{ steps.push_model.outputs.digest }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-sign
    # 在仓库 settings -> environments -> production 中设置 Required reviewers = 2
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3.6.0
      - env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}@${{ needs.build-and-sign.outputs.backend_digest }}
          MODEL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_MODEL_API }}@${{ needs.build-and-sign.outputs.model_digest }}
        run: ./scripts/verify_release_integrity.sh "$BACKEND_IMAGE" "$MODEL_IMAGE"
      - run: |
          mkdir -p release-audit
          cat > release-audit/production-release.json <<EOF
          {
            "releaseTag": "${{ github.event.inputs.release_tag }}",
            "commit": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "backendDigest": "${{ needs.build-and-sign.outputs.backend_digest }}",
            "modelDigest": "${{ needs.build-and-sign.outputs.model_digest }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: production-release-audit
          path: release-audit/production-release.json
