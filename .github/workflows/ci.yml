name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify dependency lock files are up to date
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-compile --quiet --generate-hashes --resolver=backtracking --output-file requirements.lock requirements.txt
          pip-compile --quiet --generate-hashes --resolver=backtracking --output-file model-api/requirements.lock model-api/requirements.txt
          git diff --exit-code requirements.lock model-api/requirements.lock

      - name: Install dependencies from lock file
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install pip-audit pytest checkov pip-licenses cyclonedx-bom

      - name: Unit tests
        run: pytest -q tests/test_split.py tests/test_metrics.py

      - name: Integration tests
        run: pytest -q tests/integration

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_COMMIT_SCAN: 'false'

      - name: SCA scan (pip-audit)
        run: pip-audit --strict -r requirements.lock

      - name: Build backend image
        run: docker build -t reco-backend:ci ./backend

      - name: Build model-api image
        run: docker build -t reco-model-api:ci ./model-api

      - name: Image CVE scan - backend
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: reco-backend:ci
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Image CVE scan - model-api
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: reco-model-api:ci
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: IaC scan (Checkov)
        run: checkov -d . --framework dockerfile,docker_compose,secrets --quiet

      - name: Generate SBOM (CycloneDX)
        run: cyclonedx-py requirements requirements.lock --output-file sbom-python.cdx.json --spec-version 1.5

      - name: License compliance check (deny high-risk licenses)
        run: |
          pip-licenses \
            --from=mixed \
            --with-urls \
            --allow-only='MIT License;BSD License;BSD-2-Clause;BSD-3-Clause;Apache Software License;Apache License 2.0;Python Software Foundation License;ISC License;MPL-2.0;Public Domain;LGPLv2+;LGPLv3+'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.cdx.json
