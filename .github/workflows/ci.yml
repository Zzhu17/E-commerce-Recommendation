name: CI

on:
  push:
  pull_request:

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_COMMIT_SCAN: "false"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Python unit tests
        run: pytest -q

      - name: SCA scan (pip-audit)
        run: pip-audit --strict

      - name: Build backend image
        run: docker build -t reco-backend:ci ./backend

      - name: Build model-api image
        run: docker build -t reco-model-api:ci ./model-api

      - name: Image CVE scan - backend (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: reco-backend:ci
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Image CVE scan - model-api (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: reco-model-api:ci
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: '1'
