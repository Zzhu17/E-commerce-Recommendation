server:
  port: 8080

app:
  version: 0.1.0

model:
  base-url: http://localhost:8000
  timeout-ms: 1500
  default-version: v2026.01

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379

candidate:
  source: db

feedback:
  sink: db
  sink-path: backend/feedback.log

privacy:
  feedback:
    collect-optional-fields: false
    extra-whitelist:
      - position
      - page
      - source
      - experiment_id
      - latency_ms
    user-token:
      active-salt-version: ${FEEDBACK_USER_TOKEN_ACTIVE_SALT_VERSION}
      pepper: ${FEEDBACK_USER_TOKEN_PEPPER}
      salts:
        v1: ${FEEDBACK_USER_TOKEN_SALT_V1}

reco:
  cache:
    enabled: false
    ttl-seconds: 120

api:
  auth:
    enabled: ${API_AUTH_ENABLED:true}
    jwt-secret: ${API_AUTH_JWT_SECRET}
    issuer: ${API_AUTH_ISSUER:reco-api}
    audience: ${API_AUTH_AUDIENCE:reco-admin}
    clock-skew-seconds: 30
    roles-claim: roles
    read-ops-role: ops_read
    write-ops-role: ops_write
    platform-admin-role: platform_admin
    auth-failure-limit: 10
    auth-failure-window-seconds: 60
  rate-limit:
    enabled: ${API_RATE_LIMIT_ENABLED:true}
    limit: 60
    window-seconds: 60
    store: memory

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: reco-api
    version: ${app.version:0.1.0}

retention:
  hot-days: 90
  warm-days: 180
  cold-days: 365
  cleanup:
    cron: "0 30 2 * * *"
    batch-size: 5000
  artifact:
    ttl-days: 30
    paths:
      - exports
      - artifacts
    include-extensions:
      - .csv
      - .log
      - .json
