services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - conversionops_pgdata:/var/lib/postgresql/data
      - ${POSTGRES_TLS_SERVER_CERT_PATH:-./ops/tls/postgres/server.crt}:/var/lib/postgresql/server.crt:ro
      - ${POSTGRES_TLS_SERVER_KEY_PATH:-./ops/tls/postgres/server.key}:/var/lib/postgresql/server.key:ro
      - ${POSTGRES_TLS_CA_CERT_PATH:-./ops/tls/postgres/ca.crt}:/var/lib/postgresql/root.crt:ro
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
      -c ssl_ca_file=/var/lib/postgresql/root.crt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reco-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  model-api:
    build:
      context: ./model-api
    environment:
      MODEL_VERSION: v2026.01
    networks:
      - reco-net
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?sslmode=require&sslrootcert=/run/secrets/postgres-ca.crt
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MODEL_BASE_URL: http://model-api:8000
      CANDIDATE_SOURCE: db
      FEEDBACK_SINK: db
      SPRING_SQL_INIT_MODE: always
      SERVER_PORT: 8080
      API_RATE_LIMIT_STORE: redis
      SPRING_DATA_REDIS_HOST: redis
      API_AUTH_ENABLED: "true"
      API_AUTH_KEY: ${API_AUTH_KEY}
      API_AUTH_ADMIN_KEY: ${API_AUTH_ADMIN_KEY}
    depends_on:
      - postgres
      - model-api
      - redis
    networks:
      - reco-net
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    volumes:
      - ${POSTGRES_TLS_CA_CERT_PATH:-./ops/tls/postgres/ca.crt}:/run/secrets/postgres-ca.crt:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7
    command: ["redis-server", "--protected-mode", "yes", "--bind", "0.0.0.0", "--port", "6379"]
    networks:
      - reco-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  gateway:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACTUATOR_BASIC_AUTH_USER: ${ACTUATOR_BASIC_AUTH_USER}
      ACTUATOR_BASIC_AUTH_PASSWORD_HASH: ${ACTUATOR_BASIC_AUTH_PASSWORD_HASH}
    volumes:
      - ./frontend:/srv:ro
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - model-api
    networks:
      - reco-net
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

volumes:
  conversionops_pgdata:
  caddy_data:
  caddy_config:

networks:
  reco-net:
    driver: bridge
    internal: true
